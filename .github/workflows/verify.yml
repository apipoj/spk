name: verify

on:
  push:
    branches: [main, 'v3.*']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: npm run validate:manifest

      - name: Verify docs in sync with manifest
        run: npm run regen:check

      - name: Verify files in sync with manifest
        run: npm run verify:sync

      - name: Verify SPK references
        run: npm run verify:refs

      - name: Verify skill descriptions
        run: npm run verify:descriptions

      - name: Verify agent contracts
        run: npm run verify:agents

      - name: Run grep gates
        run: npm run verify:gates

      - name: Verify native skills
        run: npm run verify:native

      - name: Run tests
        run: npm test

  plugin-install:
    name: Plugin install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: Install plugin
        run: claude plugin install spk@spk

      - name: Verify plugin is installed, enabled, and version-synced
        run: |
          claude plugin list
          claude plugin list | grep -q 'spk@spk'
          claude plugin list | grep -q 'enabled'
          VERSION=$(node -p "require('./manifest.json').version")
          claude plugin list | grep -q "Version: $VERSION"
