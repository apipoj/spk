name: verify

on:
  push:
    branches: [main, 'v3.*']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: npm run validate:manifest

      - name: Verify docs in sync with manifest
        run: npm run regen:check

      - name: Verify files in sync with manifest
        run: npm run verify:sync

      - name: Run grep gates
        run: npm run verify:gates

      - name: Run tests
        run: npm test
